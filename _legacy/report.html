<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="수업 리포트가 도착했어요 💪">
<meta property="og:description" content="트레이너가 오늘 수업 리포트를 보냈어요. 확인해보세요!">
<title>수업 리포트 — TrainerLog</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#272727;--accent:#c8f135;--text:#f0f0f0;--text-muted:#888;--text-dim:#444;--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:60px;}

/* HEADER */
.report-header{background:linear-gradient(160deg,#1a1a1a 0%,#0d0d0d 100%);border-bottom:1px solid var(--border);padding:28px 20px 24px;}
.report-brand{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.report-brand span{color:var(--accent);}
.trainer-row{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.trainer-avatar{width:48px;height:48px;border-radius:50%;background:var(--accent);color:#0d0d0d;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;}
.trainer-name{font-size:18px;font-weight:700;}
.trainer-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.report-date{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-bottom:6px;}
.report-session{display:inline-flex;align-items:center;gap:6px;background:rgba(200,241,53,0.1);border:1px solid rgba(200,241,53,0.2);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--accent);}

/* BODY */
.report-body{padding:20px;max-width:560px;margin:0 auto;}

/* SESSION PROGRESS */
.session-progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.session-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.session-stat{text-align:center;padding:12px 8px;background:var(--surface2);border-radius:10px;}
.session-stat-num{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
.session-stat-label{font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:0.3px;}
.progress-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:6px;}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a0c420);border-radius:3px;transition:width 1s ease;}

/* TIER BADGE */
.tier-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;margin-top:10px;}
.tier-gold{background:rgba(250,204,21,0.12);border:1px solid rgba(250,204,21,0.3);color:#facc15;}
.tier-silver{background:rgba(148,163,184,0.12);border:1px solid rgba(148,163,184,0.3);color:#94a3b8;}
.tier-bronze{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);color:#fb923c;}

/* SECTION */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.section-title{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.section-title-icon{font-size:14px;}

/* EXERCISE TABLE */
.ex-table{width:100%;}
.ex-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.ex-row:last-child{border-bottom:none;padding-bottom:0;}
.ex-row:first-child{padding-top:0;}
.ex-name{font-size:13px;font-weight:500;}
.ex-detail{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;text-align:right;}
.ex-vol{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;text-align:right;}
.ex-rir-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-weight:500;text-align:right;}
.rir-0{background:rgba(255,92,92,0.15);color:#ff7a7a;}
.rir-1{background:rgba(200,241,53,0.12);color:var(--accent);}
.rir-2{background:rgba(96,165,250,0.12);color:#60a5fa;}

/* SET DETAILS */
.set-detail-wrap{margin-top:8px;padding:8px 0 0;}
.set-detail-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-top:1px solid rgba(255,255,255,0.04);}
.set-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);min-width:36px;margin-top:2px;}
.set-info{flex:1;font-size:12px;color:var(--text-muted);line-height:1.5;}
.set-rir{font-size:10px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;}

/* VOLUME BAR */
.vol-bars{margin-top:4px;}
.vol-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.vol-bar-label{font-size:11px;color:var(--text-muted);min-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vol-bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.vol-bar-fill{height:100%;background:var(--accent);border-radius:2px;}
.vol-bar-num{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-dim);min-width:44px;text-align:right;}

/* AI CONTENT */
.ai-content{font-size:14px;line-height:1.9;color:var(--text);white-space:pre-wrap;}
.ai-content-block{padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:10px;}
.ai-block-label{font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ai-block-text{font-size:13px;line-height:1.8;color:var(--text-muted);}

/* HOMEWORK */
.homework-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.homework-item:last-child{border-bottom:none;}
.homework-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--accent);flex-shrink:0;margin-top:1px;}
.homework-text{font-size:13px;color:var(--text-muted);line-height:1.5;}

/* FOOTER */
.report-footer{text-align:center;padding:30px 20px 0;border-top:1px solid var(--border);margin-top:20px;}
.report-footer-brand{font-size:14px;font-weight:700;margin-bottom:4px;}
.report-footer-brand span{color:var(--accent);}
.report-footer-sub{font-size:11px;color:var(--text-dim);}

/* LOADING / ERROR */
.loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-muted);}
.error-icon{font-size:48px;margin-bottom:16px;}
.error-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.error-sub{font-size:13px;color:var(--text-muted);line-height:1.6;}

/* SHARE BTN */
.share-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;max-width:560px;margin:0 auto;}
.share-btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.share-btn-kakao{background:#fee500;color:#1a1400;}
.share-btn-kakao:hover{background:#f0d800;}
.share-btn-copy{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);}
.share-btn-copy:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>

<div id="loading-screen" class="loading-wrap">
  <div class="loading-spinner"></div>
  <div class="loading-text">리포트를 불러오는 중...</div>
</div>

<div id="error-screen" class="loading-wrap" style="display:none;">
  <div class="error-icon">🔍</div>
  <div class="error-title">리포트를 찾을 수 없어요</div>
  <div class="error-sub">링크가 만료됐거나 잘못된 주소예요.<br>트레이너에게 다시 요청해주세요.</div>
</div>

<div id="report-screen" style="display:none;">
  <div class="report-header">
    <div class="report-brand">TRAINER<span>LOG</span> · 수업 리포트</div>
    <div class="trainer-row">
      <div class="trainer-avatar" id="rpt-trainer-avatar"></div>
      <div>
        <div class="trainer-name" id="rpt-trainer-name"></div>
        <div class="trainer-sub">퍼스널 트레이너</div>
      </div>
    </div>
    <div class="report-date" id="rpt-date"></div>
    <div class="report-session" id="rpt-session"></div>
  </div>

  <div class="report-body">

    <!-- 세션 현황 -->
    <div class="session-progress-card" id="rpt-session-card"></div>

    <!-- 운동 기록 -->
    <div class="section" id="rpt-exercises-section" style="display:none;">
      <div class="section-title"><span class="section-title-icon">🏋️</span>오늘의 운동</div>
      <div id="rpt-exercises"></div>
    </div>

    <!-- 볼륨 차트 -->
    <div class="section" id="rpt-volume-section" style="display:none;">
      <div class="section-title"><span class="section-title-icon">📊</span>종목별 볼륨</div>
      <div class="vol-bars" id="rpt-volume"></div>
    </div>

    <!-- AI 수업일지 -->
    <div class="section">
      <div class="section-title"><span class="section-title-icon">✨</span>수업 리포트</div>
      <div id="rpt-content"></div>
    </div>

    <div class="report-footer">
      <div class="report-footer-brand">TRAINER<span>LOG</span></div>
      <div class="report-footer-sub">트레이너와 회원을 연결하는 스마트 수업 리포트</div>
    </div>
  </div>
</div>

<div class="share-bar" id="share-bar" style="display:none;">
  <button class="share-btn share-btn-copy" onclick="copyLink()">🔗 링크 복사</button>
  <button class="share-btn share-btn-kakao" onclick="shareKakao()">카카오톡 공유</button>
</div>

<script>
const SB_URL = 'https://udnyilxwskgkofbvvzfy.supabase.co';
const SB_KEY = 'sb_publishable_FXnRJ_Hsb4TdPiQ8DNpolw_A9sOcatE';

async function sbQ(table, params) {
  const r = await fetch(SB_URL + '/rest/v1/' + table + (params||''), {
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
  });
  const t = await r.text();
  return t ? JSON.parse(t) : [];
}

function getTier(sessions) {
  if (sessions >= 100) return {label:'💎 다이아', cls:'tier-gold'};
  if (sessions >= 50) return {label:'🥇 골드', cls:'tier-gold'};
  if (sessions >= 20) return {label:'🥈 실버', cls:'tier-silver'};
  return {label:'🥉 브론즈', cls:'tier-bronze'};
}

async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const reportId = params.get('id');

  if (!reportId) { showError(); return; }

  try {
    const logs = await sbQ('logs', '?report_id=eq.' + reportId + '&select=*');
    if (!logs.length) { showError(); return; }

    const log = logs[0];
    const members = await sbQ('members', '?id=eq.' + log.member_id + '&select=*');
    const trainers = await sbQ('trainers', '?id=eq.' + log.trainer_id + '&select=name');
    const member = members[0];
    const trainer = trainers[0];

    renderReport(log, member, trainer);
  } catch(e) {
    showError();
  }
}

function renderReport(log, member, trainer) {
  const trainerName = trainer?.name || '트레이너';
  const memberName = member?.name || '회원';
  const d = new Date(log.created_at);

  // Header
  document.getElementById('rpt-trainer-avatar').textContent = trainerName[0];
  document.getElementById('rpt-trainer-name').textContent = trainerName + ' 트레이너';
  document.getElementById('rpt-date').textContent =
    d.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
  document.getElementById('rpt-session').textContent = log.session_number + '회차 수업';

  // 세션 현황
  const total = member?.total_sessions || 0;
  const done = member?.done_sessions || 0;
  const remain = total - done;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const tier = getTier(done);

  document.getElementById('rpt-session-card').innerHTML =
    '<div class="session-stats-row">' +
      '<div class="session-stat"><div class="session-stat-num">' + done + '</div><div class="session-stat-label">총 출석</div></div>' +
      '<div class="session-stat"><div class="session-stat-num">' + remain + '</div><div class="session-stat-label">잔여 회차</div></div>' +
      '<div class="session-stat"><div class="session-stat-num">' + log.session_number + '</div><div class="session-stat-label">오늘 회차</div></div>' +
    '</div>' +
    '<div class="progress-label-row"><span>진행률</span><span>' + pct + '%</span></div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div style="margin-top:10px;"><span class="tier-badge ' + tier.cls + '">' + tier.label + '</span></div>';

  // 운동 기록 (exercises_data가 있을 때)
  const exercises = log.exercises_data;
  if (exercises && exercises.length) {
    document.getElementById('rpt-exercises-section').style.display = 'block';
    document.getElementById('rpt-volume-section').style.display = 'block';

    let exHtml = '';
    let volumes = [];

    exercises.forEach(ex => {
      const totalVol = ex.sets.reduce((sum, s) => {
        const w = parseFloat(s.weight) || 0;
        const r = parseInt(s.reps) || 0;
        return sum + w * r;
      }, 0);
      if (totalVol > 0) volumes.push({name: ex.name, vol: totalVol});

      exHtml += '<div style="margin-bottom:12px;">';
      exHtml += '<div class="ex-row">';
      exHtml += '<span class="ex-name">' + ex.name + '</span>';
      exHtml += '<span class="ex-detail">' + ex.sets.length + '세트</span>';
      if (totalVol > 0) exHtml += '<span class="ex-vol">' + totalVol.toLocaleString() + '</span>';
      exHtml += '</div>';

      // 세트별 상세
      if (ex.sets.length) {
        exHtml += '<div class="set-detail-wrap">';
        ex.sets.forEach((s, i) => {
          const rirClass = s.rir == 0 ? 'rir-0' : s.rir == 1 ? 'rir-1' : 'rir-2';
          exHtml += '<div class="set-detail-item">';
          exHtml += '<span class="set-num">' + (i+1) + '세트</span>';
          exHtml += '<span class="set-info">' + s.reps + '회' + (s.feel ? ' · ' + s.feel : '') + '</span>';
          if (s.rir !== '' && s.rir !== undefined) {
            exHtml += '<span class="set-rir ' + rirClass + '">RIR ' + s.rir + '</span>';
          }
          exHtml += '</div>';
        });
        exHtml += '</div>';
      }
      exHtml += '</div>';
    });

    document.getElementById('rpt-exercises').innerHTML = exHtml;

    // 볼륨 바 차트
    if (volumes.length) {
      const maxVol = Math.max(...volumes.map(v => v.vol));
      document.getElementById('rpt-volume').innerHTML = volumes.map(v =>
        '<div class="vol-bar-row">' +
          '<span class="vol-bar-label">' + v.name + '</span>' +
          '<div class="vol-bar-track"><div class="vol-bar-fill" style="width:' + Math.round((v.vol/maxVol)*100) + '%"></div></div>' +
          '<span class="vol-bar-num">' + v.vol.toLocaleString() + '</span>' +
        '</div>'
      ).join('');
    }
  }

  // AI 수업일지 파싱해서 섹션별로 표시
  const content = log.content || '';
  const sections = parseReportContent(content);
  let contentHtml = '';

  if (sections.length) {
    sections.forEach(s => {
      contentHtml += '<div class="ai-content-block">';
      if (s.title) contentHtml += '<div class="ai-block-label">' + s.title + '</div>';
      contentHtml += '<div class="ai-block-text">' + s.body + '</div>';
      contentHtml += '</div>';
    });
  } else {
    contentHtml = '<div class="ai-content">' + content + '</div>';
  }
  document.getElementById('rpt-content').innerHTML = contentHtml;

  // Show
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('report-screen').style.display = 'block';
  document.getElementById('share-bar').style.display = 'flex';
}

function parseReportContent(text) {
  const lines = text.split('\n');
  const sections = [];
  let current = null;

  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) {
      if (current) current.body += '\n';
      return;
    }
    // 이모지로 시작하는 섹션 헤더 감지
    const isHeader = /^[🏋️💬🎯📌✅📈📝💪⭐🔥]/.test(trimmed) && trimmed.length < 30;
    if (isHeader) {
      if (current && current.body.trim()) sections.push(current);
      current = {title: trimmed, body: ''};
    } else {
      if (!current) current = {title: '', body: ''};
      current.body += (current.body ? '\n' : '') + trimmed;
    }
  });
  if (current && current.body.trim()) sections.push(current);
  return sections;
}

function showError() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href)
    .then(() => showToast('✓ 링크가 복사됐어요!'));
}

function shareKakao() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('링크 복사됨! 카카오톡에서 붙여넣기 하세요');
    setTimeout(() => { window.location.href = 'kakaolink://open'; }, 500);
  });
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  let t = document.getElementById('toast-msg');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast-msg';
    t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#c8f135;color:#0d0d0d;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:9999;transition:opacity 0.3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  toastTimer = setTimeout(() => t.style.opacity = '0', 2500);
}

loadReport();
</script>
</body>
</html>
